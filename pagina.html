<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Muñoz — Visualización Atmosférica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
 
    <style>
        :root {
            --purple: rgba(157, 78, 221, 0.18);
            --cyan:   rgba(72, 202, 228, 0.18);
            --bg:     #08080f;
        }
 
        *, *::before, *::after { box-sizing: border-box; }
 
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            perspective: 1500px;
        }
 
        /* ── Iluminación ambiental ────────────────── */
        .ambient {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, var(--purple) 0%, transparent 60%),
                radial-gradient(circle at 80% 80%, var(--cyan)   0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }
 
        /* ── Canvas de partículas ─────────────────── */
        #canvas {
            position: fixed;
            top: -15%;
            left: -15%;
            width: 130%;
            height: 130%;
            opacity: 0.65;
            z-index: 2;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
 
        /* ── Contenido central ───────────────────── */
        .main {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 18px;
        }
 
        /* ── Botones de navegación ───────────────── */
        .nav-link {
            background: rgba(255,255,255,0.01);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.45);
            padding: 18px 0;
            width: 280px;
            text-align: center;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: all 0.55s cubic-bezier(0.23, 1, 0.32, 1);
            user-select: none;
        }
 
        .nav-link:hover {
            transform: translateY(-14px) translateZ(50px);
            background: rgba(255,255,255,0.03);
            border-color: rgba(72,202,228,0.25);
            color: #fff;
            letter-spacing: 6px;
            box-shadow: 0 24px 50px rgba(0,0,0,0.5);
        }
 
        /* ── Firma inferior ───────────────────────── */
        .footer-id {
            position: fixed;
            bottom: 36px;
            right: 48px;
            text-align: right;
            z-index: 15;
            pointer-events: none;
            opacity: 0.35;
        }
 
        .footer-id h2 {
            font-size: 0.9rem;
            font-weight: 200;
            letter-spacing: 6px;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
        }
 
        .footer-id p {
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: rgba(72,202,228,0.8);
            margin: 6px 0 0;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
 
    <div class="ambient"></div>
    <canvas id="canvas"></canvas>
 
    <div class="main">
        <div class="nav-link">EcoTrack System</div>
        <div class="nav-link">TicketBeat 247</div>
        <div class="nav-link">Arquitectura Admin</div>
    </div>
 
    <div class="footer-id">
        <h2>Mario Muñoz</h2>
        <p>System Analyst // 2026</p>
    </div>
 
    <script>
        const canvas = document.getElementById('canvas');
        const ctx    = canvas.getContext('2d');
        let   pts    = [];
 
        const CONFIG = {
            count:   130,
            connect: 200,
            speed:   0.15,
            alpha:   0.13
        };
 
        /* ── Init / Resize ──────────────────────── */
        function init() {
            canvas.width  = window.innerWidth  * 1.3;
            canvas.height = window.innerHeight * 1.3;
            pts = Array.from({ length: CONFIG.count }, () => ({
                x:  Math.random() * canvas.width,
                y:  Math.random() * canvas.height,
                z:  Math.random() * 80 + 20,
                vx: (Math.random() - 0.5) * CONFIG.speed,
                vy: (Math.random() - 0.5) * CONFIG.speed
            }));
        }
 
        /* ── Mouse parallax ─────────────────────── */
        window.addEventListener('mousemove', ({ clientX, clientY }) => {
            const rx = (clientY - window.innerHeight / 2) / 40;
            const ry = (clientX - window.innerWidth  / 2) / 40;
            canvas.style.transform = `rotateX(${-rx}deg) rotateY(${ry}deg)`;
        });
 
        /* ── Render loop ────────────────────────── */
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
 
            pts.forEach((p, i) => {
                // Mover
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width)  p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height)  p.vy *= -1;
 
                // Dibujar punto
                const bright = (p.z / 100) * 0.4;
                ctx.fillStyle = `rgba(255,255,255,${bright})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.z / 50, 0, Math.PI * 2);
                ctx.fill();
 
                // Dibujar conexiones
                for (let j = i + 1; j < pts.length; j++) {
                    const p2   = pts[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist >= CONFIG.connect) continue;
 
                    const a     = (1 - dist / CONFIG.connect) * CONFIG.alpha;
                    const color = i % 3 === 0
                        ? `rgba(157,78,221,${a})`
                        : `rgba(72,202,228,${a})`;
 
                    ctx.strokeStyle = color;
                    ctx.lineWidth   = 0.4;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            });
 
            requestAnimationFrame(draw);
        }
 
        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
